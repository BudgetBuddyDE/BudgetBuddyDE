name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-checks:
    name: Formatting, Linting, Tests and Builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check root formatting
        run: npm run format:check

      - name: Check root linting
        run: npm run lint:check

      - name: Run workspace checks (Turbo)
        run: npm run check

      - name: Run workspace tests (Turbo)
        run: npm run test

      - name: Build packages (Turbo)
        run: npm run build-packages

      - name: Build services (Turbo)
        run: npm run build-services

      - name: Build apps (Turbo)
        run: npm run build-apps
