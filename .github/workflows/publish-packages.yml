name: Publish public packages

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run npm publish with --dry-run
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  release:
    types:
      - published

concurrency:
  group: publish-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @budgetbuddyde/api, db and types
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Validate workspace
        run: npx turbo run lint:check typecheck test build

      - name: Publish package dry-run
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        run: |
          npm publish --workspace @budgetbuddyde/types --dry-run
          npm publish --workspace @budgetbuddyde/api --dry-run
          npm publish --workspace @budgetbuddyde/db --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish package
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false')
        run: |
          npm publish --workspace @budgetbuddyde/types --provenance
          npm publish --workspace @budgetbuddyde/api --provenance
          npm publish --workspace @budgetbuddyde/db --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
