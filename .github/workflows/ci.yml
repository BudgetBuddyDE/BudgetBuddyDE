name: CI

on:
  pull_request:
  push:
    - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules
        id: cache
        uses: actions/cache@v6
        with:
          path: |
            node_modules
            packages/*/node_modules
            services/*/node_modules
            apps/*/node_modules
            examples/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

  quality:
    name: Validate
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Restore node_modules
        uses: actions/cache/restore@v6
        with:
          path: |
            node_modules
            packages/*/node_modules
            services/*/node_modules
            apps/*/node_modules
            examples/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          fail-on-cache-miss: true

      - name: Check workspace formatting with Turborepo
        run: npx turbo run format:check

      - name: Check linting with Turborepo
        run: npx turbo run lint:check

      - name: Typecheck with Turborepo
        run: npx turbo run typecheck

      - name: Test with Turborepo
        run: npx turbo run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Restore node_modules
        uses: actions/cache/restore@v6
        with:
          path: |
            node_modules
            packages/*/node_modules
            services/*/node_modules
            apps/*/node_modules
            examples/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          fail-on-cache-miss: true

      - name: Build packages with Turborepo
        run: npx turbo run build --filter=./packages/*

      - name: Build services with Turborepo
        run: npx turbo run build --filter=./services/*

      - name: Build apps with Turborepo
        run: npx turbo run build --filter=./apps/*

      - name: Build examples with Turborepo
        run: npx turbo run build --filter='./examples/*'
