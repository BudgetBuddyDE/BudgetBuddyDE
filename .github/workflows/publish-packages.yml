name: Publish NPM Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - api
          - db
          - types
      dry_run:
        description: "Only simulate publish"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Resolve workspace
        run: |
          case "${{ inputs.package }}" in
            api)
              echo "WORKSPACE=@budgetbuddyde/api" >> "$GITHUB_ENV"
              ;;
            db)
              echo "WORKSPACE=@budgetbuddyde/db" >> "$GITHUB_ENV"
              ;;
            types)
              echo "WORKSPACE=@budgetbuddyde/types" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported package: ${{ inputs.package }}"
              exit 1
              ;;
          esac

      - name: Install dependencies
        run: npm ci

      - name: Validate package
        run: |
          npm run check -- --filter="$WORKSPACE"
          npm run test -- --filter="$WORKSPACE"
          npm run build -- --filter="$WORKSPACE"

      - name: Publish package (dry-run)
        if: ${{ inputs.dry_run }}
        run: npm publish --workspace="$WORKSPACE" --access public --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish package
        if: ${{ !inputs.dry_run }}
        run: npm publish --workspace="$WORKSPACE" --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
